<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login · MindCare AI</title>
    <meta name="description" content="Log in to MindCare AI — your private, supportive mental health companion.">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='logo.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ── login-specific overrides ── */
        .password-wrapper {
            position: relative;
        }
        .password-wrapper input {
            padding-right: 2.8rem;
        }
        .toggle-eye {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 1.05rem;
            padding: 0;
            line-height: 1;
            transition: color 0.2s;
        }
        .toggle-eye:hover { color: var(--text-muted); }

        .show-pw-row {
            display: flex;
            align-items: center;
            gap: 0.45rem;
            margin-top: 0.15rem;
        }
        .show-pw-row input[type="checkbox"] {
            width: auto;
            accent-color: var(--accent);
            cursor: pointer;
        }
        .show-pw-row label {
            margin: 0;
            font-size: 0.82rem;
            color: var(--text-dim);
            cursor: pointer;
            user-select: none;
        }

        .forgot-link {
            display: block;
            text-align: right;
            font-size: 0.82rem;
            margin-top: 0.25rem;
            color: var(--accent);
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .forgot-link:hover { opacity: 0.8; text-decoration: underline; }
    </style>
</head>

<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <img src="{{ url_for('static', filename='logo.svg') }}" alt="MindCare AI" style="width:56px;height:56px;margin:0 auto 0.75rem;display:block">
                <h1>MindCare AI</h1>
                <p>Welcome back</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
            {% endwith %}

            <form method="POST" id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input id="username" type="text" name="username" placeholder="Enter your username" required autofocus>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input id="password" type="password" name="password" placeholder="Enter your password" required>
                        <button type="button" class="toggle-eye" id="toggleEye" aria-label="Toggle password visibility">👁</button>
                    </div>
                    <div class="show-pw-row">
                        <input id="showPw" type="checkbox">
                        <label for="showPw">Show password</label>
                    </div>
                    <a href="{{ url_for('forgot_password') }}" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-full">Log in ✨</button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="{{ url_for('signup') }}">Sign up</a>
            </div>
        </div>
    </div>

    <script>
        /* ── Show / hide password ── */
        const pwInput  = document.getElementById('password');
        const checkbox = document.getElementById('showPw');
        const eyeBtn   = document.getElementById('toggleEye');

        function togglePw() {
            const show = pwInput.type === 'password';
            pwInput.type = show ? 'text' : 'password';
            eyeBtn.textContent = show ? '🙈' : '👁';
            checkbox.checked = show;
        }

        checkbox.addEventListener('change', togglePw);
        eyeBtn.addEventListener('click', togglePw);
    </script>
</body>

</html>
