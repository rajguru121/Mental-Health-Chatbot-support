<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password · MindCare AI</title>
    <meta name="description" content="Reset your MindCare AI password.">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='logo.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        .success-msg {
            text-align: center;
            padding: 0.85rem 1rem;
            border-radius: 10px;
            background: var(--accent-soft);
            color: #6ee7b7;
            font-size: 0.88rem;
            border-left: 3px solid var(--success);
            margin-bottom: 1rem;
            animation: slideUp 0.35s ease-out;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.85rem;
            color: var(--accent);
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .back-link:hover { opacity: 0.8; text-decoration: underline; }
    </style>
</head>

<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <img src="{{ url_for('static', filename='logo.svg') }}" alt="MindCare AI" style="width:56px;height:56px;margin:0 auto 0.75rem;display:block">
                <h1>MindCare AI</h1>
                <p>Reset your password</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
            {% endwith %}

            <div class="success-msg" id="successMsg" style="display:none;"></div>

            <form method="POST" id="forgotForm">
                <div class="form-group">
                    <label for="identifier">Email or Username</label>
                    <input id="identifier" type="text" name="identifier" placeholder="Enter your email or username" required autofocus>
                </div>
                <button type="submit" class="btn btn-primary btn-full" id="resetBtn">Reset Password</button>
            </form>

            <div class="auth-footer">
                <a href="{{ url_for('login') }}" class="back-link">← Back to login</a>
            </div>
        </div>
    </div>

    <script>
        const form    = document.getElementById('forgotForm');
        const msg     = document.getElementById('successMsg');
        const btn     = document.getElementById('resetBtn');

        form.addEventListener('submit', e => {
            e.preventDefault();
            const id = document.getElementById('identifier').value.trim();
            if (!id) return;

            /* Show generic message regardless — never reveal account existence */
            btn.disabled = true;
            btn.textContent = 'Sending…';

            setTimeout(() => {
                msg.textContent = 'If an account exists with that information, reset instructions have been sent.';
                msg.style.display = 'block';
                btn.textContent = 'Reset Password';
                btn.disabled = false;
            }, 800);
        });
    </script>
</body>

</html>
